nosotros.historia.titulo=Nossa hist\u00f3ria
nosotros.historia.p1=Griffin Lamps nasceu da paix\u00e3o pelo design de ilumina\u00e7\u00e3o e pela busca de criar espa\u00e7os inspiradores. Fundada em 2020, nossa miss\u00e3o \u00e9 oferecer l\u00e2mpadas de design contempor\u00e2neo que combinam funcionalidade, est\u00e9tica e qualidade.
nosotros.historia.p2=Somos especializados em selecionar as melhores pe\u00e7as do design internacional, de cl\u00e1ssicos atemporais a inova\u00e7\u00f5es modernas. Cada l\u00e2mpada da nossa cole\u00e7\u00e3o foi cuidadosamente escolhida pela sua capacidade de transformar espa\u00e7os e criar atmosferas \u00fanicas.
nosotros.valores.titulo=Nossos valores
nosotros.valores.diseno.titulo=Design
nosotros.valores.diseno.texto=Selecionamos cuidadosamente cada pe\u00e7a pelo seu valor est\u00e9tico e pela sua capacidade de valorizar qualquer espa\u00e7o.
nosotros.valores.calidad.titulo=Qualidade
nosotros.valores.calidad.texto=Trabalhamos apenas com materiais premium e fabricantes reconhecidos que garantem durabilidade e excel\u00eancia.
nosotros.valores.servicio.titulo=Servi\u00e7o
nosotros.valores.servicio.texto=Comprometemo-nos a oferecer uma experi\u00eancia de compra excepcional, da sele\u00e7\u00e3o \u00e0 entrega.
nosotros.colecciones.titulo=Nossas cole\u00e7\u00f5es
nosotros.colecciones.intro=Oferecemos uma variedade de cole\u00e7\u00f5es projetadas para diferentes estilos e necessidades:
nosotros.colecciones.classic=Designs atemporais que nunca saem de moda
nosotros.colecciones.contemporary=Pe\u00e7as modernas e vers\u00e1teis
nosotros.colecciones.japanese=Inspirado na elega\u00e2ncia japonesa
nosotros.colecciones.ambient=Ilumina\u00e7\u00e3o que cria atmosferas \u00fanicas
nosotros.colecciones.modern=O \u00faltimo em inova\u00e7\u00e3o de design
nosotros.colecciones.nature=Formas org\u00e2nicas e naturais
nosotros.instagram.titulo=Conecte-se conosco
nosotros.instagram.texto=Siga-nos no Instagram para mais inspira\u00e7\u00e3o, novos produtos e projetos dos nossos clientes.
