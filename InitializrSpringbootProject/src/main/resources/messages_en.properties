nosotros.historia.titulo=Our Story
nosotros.historia.p1=Griffin Lamps was born from a passion for lighting design and the pursuit of creating inspiring spaces. Founded in 2020, our mission is to offer contemporary design lamps that combine functionality, aesthetics and quality.
nosotros.historia.p2=We specialize in selecting the finest pieces of international design, from timeless classics to modern innovations. Every lamp in our collection has been carefully chosen for its ability to transform spaces and create unique atmospheres.
nosotros.valores.titulo=Our Values
nosotros.valores.diseno.titulo=Design
nosotros.valores.diseno.texto=We carefully select each piece for its aesthetic value and its ability to elevate any space.
nosotros.valores.calidad.titulo=Quality
nosotros.valores.calidad.texto=We work only with premium materials and recognized manufacturers that guarantee durability and excellence.
nosotros.valores.servicio.titulo=Service
nosotros.valores.servicio.texto=We are committed to offering an exceptional shopping experience from selection to delivery.
nosotros.colecciones.titulo=Our Collections
nosotros.colecciones.intro=We offer a variety of collections designed for different styles and needs:
nosotros.colecciones.classic=Timeless designs that never go out of style
nosotros.colecciones.contemporary=Modern and versatile pieces
nosotros.colecciones.japanese=Inspired by Japanese elegance
nosotros.colecciones.ambient=Lighting that creates unique atmospheres
nosotros.colecciones.modern=The latest in design innovation
nosotros.colecciones.nature=Organic and natural forms
nosotros.instagram.titulo=Connect with Us
nosotros.instagram.texto=Follow us on Instagram for more inspiration, new products and projects from our clients.
