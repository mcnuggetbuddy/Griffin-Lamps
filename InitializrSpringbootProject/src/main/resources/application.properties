spring.application.name=pagina

server.port=8081

logging.pattern.dateformat=hh:mm

spring.main.banner-mode=off

spring.thymeleaf.cache=false

spring.datasource.url=jdbc:mysql://localhost:3306/griffin_lamps?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

spring.datasource.username=admin
spring.datasource.password=123456

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE

firebase.bucket.name=griffin-lamps.firebasestorage.app
firebase.storage.path=griffin-lamps
firebase.json.path=firebase
firebase.json.file=griffin-lamps-firebase-adminsdk-fbsvc-42b89db9cc.json

spring.output.ansi.enabled=ALWAYS

#Propiedades para enviar correos
spring.profiles.active=local
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#Nombre del servidor donde está la tienda
servidor.http=http://localhost:8081