<section th:fragment="agregar">
    <div class='row py-4 mb-2 bg-light'>
        <div class='col-md-1'></div>
        <div class='col-md-3'>
            <button type="button" class="btn btn-primary"
                    data-bs-toggle="modal" data-bs-target="#agregarProductoModal">
                <i class="fa-solid fa-plus"></i> Agregar producto
            </button>
        </div>
    </div>

    <div class="modal fade" id="agregarProductoModal" tabindex="-1"
         aria-labelledby="agregarProductoLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h1 class="modal-title fs-5" id="agregarProductoLabel">
                        <i class="fa-solid fa-lightbulb"></i> Agregar producto
                    </h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action='@{/producto/guardar}' th:object='${producto}'
                      class='was-validated' method="post">
                    <div class="modal-body">
                        <div class='mb-3'>
                            <label>Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control" required="true"/>
                        </div>
                        <div class='mb-3'>
                            <label>Descripción</label>
                            <textarea th:field="*{descripcion}" class="form-control" required="true"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Precio colones</label>
                                <input type="number" step="0.01" th:field="*{precioColones}" class="form-control" required="true"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Tipo de luz</label>
                                <input type="text" th:field="*{tipoLuz}" class="form-control" required="true"/>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Material</label>
                                <input type="text" th:field="*{material}" class="form-control" required="true"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Tipo de conexión</label>
                                <input type="text" th:field="*{tipoConexion}" class="form-control" required="true"/>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Duración batería</label>
                                <input type="text" th:field="*{duracionBateria}" class="form-control"/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Colección ID</label>
                                <input type="number" th:field="*{coleccionId}" class="form-control" required="true"/>
                            </div>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" th:field="*{activo}" class="form-check-input"/>
                            <label class="form-check-label">Activo</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" th:field="*{destacado}" class="form-check-input"/>
                            <label class="form-check-label">Destacado</label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Cerrar
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Guardar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>

<section th:fragment="listado" class="p-3">
    <div class="row p-3">
        <div class="col-md-9">
            <div class="card p-2">
                <div class="card-header">
                    <h4>Productos</h4>
                </div>
                <div class="card-body">
                    <div th:if="${productos != null and !productos.empty}">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Nombre</th>
                                    <th>Precio</th>
                                    <th>Tipo luz</th>
                                    <th>Material</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${productos}">
                                    <td>[[${p.id}]]</td>
                                    <td>[[${p.nombre}]]</td>
                                    <td>₡[[${p.precioColones}]]</td>
                                    <td>[[${p.tipoLuz}]]</td>
                                    <td>[[${p.material}]]</td>
                                    <td>
                                        <button type="button" class="btn btn-danger"
                                                data-bs-toggle="modal" data-bs-target="#confirmModal"
                                                th:data-bs-id="${p.id}"
                                                th:data-bs-descripcion="${p.nombre}">
                                            Eliminar
                                        </button>
                                        <a th:href="@{/producto/modificar/}+${p.id}" class="btn btn-warning">
                                            Editar
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="text-center p-2" th:if="${productos == null or productos.empty}">
                        <span>No hay registros para mostrar</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center bg-success text-white mb-3">
                <div class="card-body">
                    <h3>Total de productos</h3>
                    <h4 class="fs-2">[[${totalProductos}]]</h4>
                </div>
            </div>
        </div>
    </div>
</section>

<section th:fragment="editar">
    <div class="row">
        <div class="col-md-2"></div>
        <div class="col-md-8">
            <form method="POST" th:action="@{/producto/guardar}"
                  th:object="${producto}" class="was-validated">
                <input type="hidden" th:field="*{id}"/>

                <div class="row py-4 mb-4 bg-light">
                    <div class="col-md-4 d-grid">
                        <a th:href="@{/producto/listado}" class="btn btn-primary">
                            Regresar
                        </a>
                    </div>
                    <div class="col-md-4 d-grid">
                        <button type="submit" class="btn btn-success">
                            Guardar
                        </button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h4>Editar producto</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label>Nombre</label>
                            <input type="text" class="form-control" th:field="*{nombre}" required="true"/>
                        </div>
                        <div class="mb-3">
                            <label>Descripción</label>
                            <textarea class="form-control" th:field="*{descripcion}" required="true"></textarea>
                        </div>
                        <div class="mb-3">
                            <label>Precio colones</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{precioColones}" required="true"/>
                        </div>
                        <div class="mb-3">
                            <label>Tipo de luz</label>
                            <input type="text" class="form-control" th:field="*{tipoLuz}" required="true"/>
                        </div>
                        <div class="mb-3">
                            <label>Material</label>
                            <input type="text" class="form-control" th:field="*{material}" required="true"/>
                        </div>
                        <div class="mb-3">
                            <label>Tipo de conexión</label>
                            <input type="text" class="form-control" th:field="*{tipoConexion}" required="true"/>
                        </div>
                        <div class="mb-3">
                            <label>Duración batería</label>
                            <input type="text" class="form-control" th:field="*{duracionBateria}"/>
                        </div>
                        <div class="mb-3">
                            <label>Colección ID</label>
                            <input type="number" class="form-control" th:field="*{coleccionId}" required="true"/>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" th:field="*{activo}"/>
                            <label class="form-check-label">Activo</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" th:field="*{destacado}"/>
                            <label class="form-check-label">Destacado</label>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>

<section th:fragment="confirmarEliminar">
    <div class="modal fade"
         id="confirmModal"
         tabindex="-1"
         aria-labelledby="modalLabel"
         aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/producto/eliminar}" method="post">
                    <input type="hidden" name="id" id="modalId"/>
                    <div class="modal-header bg-warning text-white">
                        <h5 class="modal-title" id="modalLabel">Confirmar eliminación</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p>¿Desea eliminar <span id="modalDescripcion"></span>?</p>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-danger">Eliminar</button>
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
