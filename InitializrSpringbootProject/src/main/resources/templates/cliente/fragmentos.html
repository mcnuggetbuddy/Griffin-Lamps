<!-- fragmento 1 para Tarjetas de productos.html -->
<section th:fragment="tarjetas" class="container py-4">
    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 row-cols-xl-4 g-4">
        <div th:each="p : ${productos}" class="col">
            <div class="card h-100 shadow-sm">

                <!-- IMAGEN -->
                <a th:href="@{/producto/{id}(id=${p.idProducto})}">
                    <div style="aspect-ratio:1/1; overflow:hidden; background:#f5f5f5;">
                        <img th:if="${!#lists.isEmpty(p.imagenes)}"
                             th:src="${p.imagenes[0].rutaImagen}"
                             th:alt="${p.nombre}"
                             style="width:100%; height:100%; object-fit:cover;"/>
                        <div th:if="${#lists.isEmpty(p.imagenes)}"
                             style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;">
                            <i class="fas fa-image fa-3x text-muted"></i>
                        </div>
                    </div>
                </a>

                <!-- TÍTULO -->
                <div class="card-header bg-white">
                    <h5 class="card-title text-center text-truncate mb-0"
                        th:text="${p.nombre}"></h5>
                </div>

                <!-- BODY -->
                <div class="card-body d-flex flex-column">
                    <p class="card-text text-muted mb-auto text-truncate"
                       th:text="${p.coleccion.nombre}"></p>
                </div>

                <!-- FOOTER -->
                <div class="card-footer bg-white d-flex justify-content-between align-items-center">
                    <div class="fw-bold">
                        <span class="text-success h5"
                              th:text="'₡' + ${#numbers.formatDecimal(p.precioColones, 1, 'POINT', 2, 'COMMA')}"></span>
                        <span th:if="${p.existencias > 0}"
                              class="badge text-bg-success ms-2"
                              th:text="${p.existencias} + ' u.'"></span>
                        <span th:unless="${p.existencias > 0}"
                              class="badge text-bg-danger ms-2">[[#{estado.agotado}]]</span>
                    </div>
                    <div class="d-flex gap-2">
                        <a th:href="@{/producto/{id}(id=${p.idProducto})}"
                           class="btn btn-sm btn-outline-dark">
                            <i class="fas fa-eye"></i>
                        </a>
                        <form th:action="@{/carrito/agregar}" method="POST" class="d-inline">
                            <input type="hidden" th:value="${p.idProducto}" name="idProducto"/>
                            <button type="submit"
                                    class="btn btn-sm btn-dark"
                                    th:disabled="${p.existencias == 0}">
                                <i class="fas fa-cart-plus"></i>
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- LISTA VACÍA -->
    <div th:if="${productos == null or productos.empty}" class="text-center py-5">
        <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
        <p class="text-muted">[[#{lista.vacia}]]</p>
    </div>
</section>
