<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>
        <header th:replace="~{general/fragmentos :: header}"></header>

        <main>
            <section th:replace="~{cliente/fragmentos :: coleccionesTabs}"></section>

            <section th:if="${productos != null and !#lists.isEmpty(productos)}"
                     th:replace="~{cliente/fragmentos :: tarjetas}">
            </section>

            <div th:if="${productos == null or #lists.isEmpty(productos)}"
                 class="container text-center py-5">
                <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
                <h5 class="text-muted">No hay productos disponibles en esta colección.</h5>
            </div>
        </main>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>
    </body>
</html>
