<!-- Fragmento #1 que irá en el head de todas las páginas, así se incluye todo lo necesario de configuración-->
<head th:fragment="head">
    <title>GriffinLamps</title>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/png" sizes="16x16" href="/fav/favicon-16x16.png"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/fav/favicon-32x32.png"/>
    <link rel="icon" type="image/png" sizes="96x96" href="/fav/favicon-96x96.png"/>
    <link rel="icon" type="image/png" sizes="256x256" href="/fav/favicon-256x256.png"/>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/webjars/font-awesome/css/all.css}" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <script th:src="@{/js/rutinas.js}"></script>
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
</head>

<!-- Fragmento #2  define el encabezado de las páginas, en concreto el menú y enlaces rápidos -->
<header th:fragment="header" class="header">
    <nav class="navbar navbar-expand-sm p-0">
        <div class="container-fluid"> 
            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/logo/Griffin-Lamps-LogoWEB-01.svg}"
                     th:alt="#{aplicacion.titulo}"
                     height="60"/>
            </a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">
                <ul class="navbar-nav">
                    <li class="nav-item px-2"><a class="nav-link" th:href="@{/colecciones/listado}">[[#{plantilla.colecciones}]]</a></li>
                    <li class="nav-item px-2"><a class="nav-link" th:href="@{/producto/listado}">[[#{plantilla.productos}]]</a></li>
                    <li class="nav-item px-2"><a class="nav-link" th:href="@{/about/listado}">[[#{plantilla.about}]]</a></li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control rounded-5 me-2" type="search" th:placeholder="#{plantilla.barra.buscar}" aria-label="Search"/>
                    <button class="btn btn-outline-success rounded-5" type="submit">[[#{plantilla.boton.buscar}]]</button>
                </form>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button" aria-expanded="false">
                            [[#{plantilla.idioma}]]</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/(lang=es)}">Español</a></li>
                            <li><a class="dropdown-item" th:href="@{/(lang=en)}">English</a></li>
                            <li><a class="dropdown-item" th:href="@{/(lang=fr)}">Française</a></li>
                            <li><a class="dropdown-item" th:href="@{/(lang=pt)}">Portugaise</a></li>
                        </ul>
                    </li>
                </ul>
                <div id="resultBlock">
                </div>
            </div>
        </div>
    </nav>
</header>


<!-- Fragmento #3  define el footer de las páginas, aparte de esto se podria incluir enlaces a redes socilaes y demás -->
<footer th:fragment="footer" class="p-2 mt-5 bg-light text-black">
    <p class="lead text-center">[[#{plantilla.derechos}]] &COPY;</p>
</footer>

<!-- Fragmento #4 Hero Section del index-->
<section th:fragment="hero" class="hero">
    <div class="container col-xxl-8 px-4 py-5">
        <div class="row flex-lg-row-reverse align-items-center g-5 py-5">
            <div class="col-10 col-sm-8 col-lg-6">
            </div>
            <div class="col-lg-6">
                <h1 class="display-5 fw-bold text-white lh-1 mb-3">[[#{plantilla.hero.titulo}]]</h1>
                <p class="lead text-white">[[#{plantilla.hero.texto}]]</p>
                <div class="d-grid gap-2 d-md-flex justify-content-md-start">
                    <button type="button" class="btn btn-light btn-lg px-4 me-md-2 rounded-5">[[#{plantilla.hero.boton}]]</button>
                </div>
            </div>
        </div>
    </div>
</section>
