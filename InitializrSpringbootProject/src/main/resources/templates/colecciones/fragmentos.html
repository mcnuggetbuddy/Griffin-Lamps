<section th:fragment="listado" class="p-3">
    <div class="row p-3">
        <div class="col-md-9">
            <div class="card p-2">
                <div class="card-header">
                    <h4>[[#{coleccion.listado}]]</h4>
                </div>
                <div class="card-body">
                    <div th:if="${colecciones != null and !colecciones.empty}">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>[[#{coleccion.nombre}]]</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="c : ${colecciones}">
                                    <td>[[${c.id}]]</td>
                                    <td>[[${c.nombre}]]</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="text-center p-2" th:if="${colecciones == null or colecciones.empty}">
                        <span>[[#{lista.vacia}]]</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center bg-success text-white mb-3">
                <div class="card-body">
                    <h3>[[#{coleccion.total}]]</h3>
                    <h4 class="fs-2">[[${totalColecciones}]]</h4>
                </div>
            </div>
        </div>
    </div>
</section>
