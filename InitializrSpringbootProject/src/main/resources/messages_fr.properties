# -----------------------------
nosotros.historia.titulo=Notre histoire
nosotros.historia.p1=Griffin Lamps est n\u00e9e d\u2019une passion pour le design d\u2019\u00e9clairage et la recherche d\u2019espaces inspirants. Fond\u00e9e en 2020, notre mission est de proposer des lampes de design contemporain alliant fonctionnalit\u00e9, esth\u00e9tique et qualit\u00e9.
nosotros.historia.p2=Nous nous sp\u00e9cialisons dans la s\u00e9lection des meilleures pi\u00e8ces du design international, des classiques intemporels aux innovations modernes. Chaque lampe de notre collection a \u00e9t\u00e9 soigneusement choisie pour sa capacit\u00e9 \u00e0 transformer les espaces et cr\u00e9er des atmosph\u00e8res uniques.
nosotros.valores.titulo=Nos valeurs
nosotros.valores.diseno.titulo=Design
nosotros.valores.diseno.texto=Nous s\u00e9lectionnons soigneusement chaque pi\u00e8ce pour sa valeur esth\u00e9tique et sa capacit\u00e9 \u00e0 sublimer tout espace.
nosotros.valores.calidad.titulo=Qualit\u00e9
nosotros.valores.calidad.texto=Nous travaillons uniquement avec des mat\u00e9riaux haut de gamme et des fabricants reconnus qui garantissent durabilit\u00e9 et excellence.
nosotros.valores.servicio.titulo=Service
nosotros.valores.servicio.texto=Nous nous engageons \u00e0 offrir une exp\u00e9rience d\u2019achat exceptionnelle, de la s\u00e9lection \u00e0 la livraison.
nosotros.colecciones.titulo=Nos collections
nosotros.colecciones.intro=Nous proposons une vari\u00e9t\u00e9 de collections con\u00e7ues pour diff\u00e9rents styles et besoins\u00a0:
nosotros.colecciones.classic=Des designs intemporels qui ne se d\u00e9modent jamais
nosotros.colecciones.contemporary=Des pi\u00e8ces modernes et polyvalentes
nosotros.colecciones.japanese=Inspir\u00e9 par l\u2019\u00e9l\u00e9gance japonaise
nosotros.colecciones.ambient=Un \u00e9clairage qui cr\u00e9e des atmosph\u00e8res uniques
nosotros.colecciones.modern=Le dernier cri en innovation de design
nosotros.colecciones.nature=Des formes organiques et naturelles
nosotros.instagram.titulo=Rejoignez-nous
nosotros.instagram.texto=Suivez-nous sur Instagram pour plus d\u2019inspiration, de nouveaux produits et des projets de nos clients.
