nosotros.historia.titulo=Nuestra Historia
nosotros.historia.p1=Griffin Lamps naci\u00f3 de la pasi\u00f3n por el dise\u00f1o de iluminaci\u00f3n y la b\u00fasqueda de crear espacios que inspiren. Fundada en 2020, nuestra misi\u00f3n es ofrecer l\u00e1mparas de dise\u00f1o contempor\u00e1neo que combinen funcionalidad, est\u00e9tica y calidad.
nosotros.historia.p2=Nos especializamos en seleccionar las mejores piezas de dise\u00f1o internacional, desde cl\u00e1sicos atemporales hasta innovaciones modernas. Cada l\u00e1mpara en nuestra colecci\u00f3n ha sido cuidadosamente elegida por su capacidad para transformar espacios y crear ambientes \u00fanicos.
nosotros.valores.titulo=Nuestros Valores
nosotros.valores.diseno.titulo=Dise\u00f1o
nosotros.valores.diseno.texto=Seleccionamos cuidadosamente cada pieza por su valor est\u00e9tico y su capacidad de elevar cualquier espacio.
nosotros.valores.calidad.titulo=Calidad
nosotros.valores.calidad.texto=Trabajamos solo con materiales premium y fabricantes reconocidos que garantizan durabilidad y excelencia.
nosotros.valores.servicio.titulo=Servicio
nosotros.valores.servicio.texto=Nos comprometemos a ofrecer una experiencia de compra excepcional desde la selecci\u00f3n hasta la entrega.
nosotros.colecciones.titulo=Nuestras Colecciones
nosotros.colecciones.intro=Ofrecemos una variedad de colecciones dise\u00f1adas para diferentes estilos y necesidades:
nosotros.colecciones.classic=Dise\u00f1os atemporales que nunca pasan de moda
nosotros.colecciones.contemporary=Piezas modernas y vers\u00e1tiles
nosotros.colecciones.japanese=Inspiraci\u00f3n en la elegancia japonesa
nosotros.colecciones.ambient=Iluminaci\u00f3n que crea atm\u00f3sferas \u00fanicas
nosotros.colecciones.modern=Lo \u00faltimo en innovaci\u00f3n de dise\u00f1o
nosotros.colecciones.nature=Formas org\u00e1nicas y naturales
nosotros.instagram.titulo=Con\u00e9ctate con Nosotros
nosotros.instagram.texto=S\u00edguenos en Instagram para ver m\u00e1s inspiraci\u00f3n, nuevos productos y proyectos de nuestros clientes.
